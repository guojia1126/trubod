<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboD Pixel Logo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'VT323', monospace;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: #58a6ff;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-family: 'VT323', monospace;
            font-size: 24px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 40px;
            letter-spacing: 4px;
        }
        
        #canvas-container {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 
                0 0 0 1px rgba(88, 166, 255, 0.3),
                0 0 40px rgba(88, 166, 255, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .info {
            margin-top: 30px;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>TURBOD</h1>
    <div class="subtitle">AUTOMATED DEPLOYMENT</div>
    <div id="canvas-container"></div>
    <div class="info">PIXEL ART LOGO CONCEPT</div>
    
    <script>
        // TurboD Pixel Logo - Retro Terminal Aesthetic
        // Each "pixel" is actually a 10x10 square for that chunky pixel look
        
        const PIXEL_SIZE = 12;
        const GRID_WIDTH = 22;
        const GRID_HEIGHT = 16;
        
        // Color palette - Terminal inspired
        const COLORS = {
            bg: '#0d1117',
            primary: '#58a6ff',      // Bright blue
            secondary: '#238636',    // Green
            accent: '#f0883e',       // Orange
            highlight: '#ffffff',
            dim: '#30363d'
        };
        
        // T letterform (pixel grid 11x11)
        const T_PATTERN = [
            '###########',
            '###########',
            '###    ###',
            '###    ###',
            '###    ###',
            '###########',
            '###########',
            '###    ###',
            '###    ###',
            '###    ###',
            '###    ###'
        ];
        
        // D letterform (pixel grid 10x11)
        const D_PATTERN = [
            '########',
            '########',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '########',
            '########'
        ];
        
        // u r b o patterns
        const U_PATTERN = [
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '########',
            '########'
        ];
        
        const R_PATTERN = [
            '########',
            '########',
            '##    ##',
            '##    ##',
            '########',
            '######',
            '####',
            '##  ##',
            '##  ##',
            '##   ##',
            '##   ##'
        ];
        
        const O_PATTERN = [
            '########',
            '########',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '##    ##',
            '########',
            '########'
        ];
        
        let canvasWidth, canvasHeight;
        
        function setup() {
            canvasWidth = GRID_WIDTH * PIXEL_SIZE;
            canvasHeight = GRID_HEIGHT * PIXEL_SIZE;
            
            let canvas = createCanvas(canvasWidth, canvasHeight);
            canvas.parent('canvas-container');
            
            drawLogo();
            
            // Add subtle animation - scanline effect
            noLoop();
        }
        
        function drawLogo() {
            background(COLORS.bg);
            
            let startX = PIXEL_SIZE;
            let startY = PIXEL_SIZE * 2;
            
            // Draw "T" in primary blue
            drawLetter(T_PATTERN, startX, startY, COLORS.primary);
            
            // Draw "u" in primary blue  
            drawLetter(U_PATTERN, startX + 13 * PIXEL_SIZE, startY, COLORS.primary);
            
            // Draw "r" in secondary green
            drawLetter(R_PATTERN, startX + 13 * PIXEL_SIZE * 2, startY, COLORS.secondary);
            
            // Draw "b" in secondary green
            drawLetter(D_PATTERN, startX + 13 * PIXEL_SIZE * 3, startY, COLORS.secondary);
            
            // Draw "o" in accent orange
            drawLetter(O_PATTERN, startX + 13 * PIXEL_SIZE * 4, startY, COLORS.accent);
            
            // Draw "D" in accent orange - larger, final letter
            drawLargeLetter(D_PATTERN, startX + 13 * PIXEL_SIZE * 5 + PIXEL_SIZE * 2, startY - PIXEL_SIZE, COLORS.accent);
            
            // Add some decorative pixels around
            addDecorations(startX, startY);
        }
        
        function drawLetter(pattern, offsetX, offsetY, col) {
            for (let y = 0; y < pattern.length; y++) {
                for (let x = 0; x < pattern[y].length; x++) {
                    if (pattern[y][x] === '#') {
                        // Main pixel
                        fill(col);
                        noStroke();
                        rect(offsetX + x * PIXEL_SIZE, offsetY + y * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
                        
                        // Add highlight (top-left)
                        fill(255, 255, 255, 60);
                        rect(offsetX + x * PIXEL_SIZE, offsetY + y * PIXEL_SIZE, PIXEL_SIZE, 2);
                        rect(offsetX + x * PIXEL_SIZE, offsetY + y * PIXEL_SIZE, 2, PIXEL_SIZE);
                        
                        // Add shadow (bottom-right)
                        fill(0, 0, 0, 80);
                        rect(offsetX + x * PIXEL_SIZE + PIXEL_SIZE - 2, offsetY + y * PIXEL_SIZE, 2, PIXEL_SIZE);
                        rect(offsetX + x * PIXEL_SIZE, offsetY + y * PIXEL_SIZE + PIXEL_SIZE - 2, PIXEL_SIZE, 2);
                    }
                }
            }
        }
        
        function drawLargeLetter(pattern, offsetX, offsetY, col) {
            let largePixel = PIXEL_SIZE * 1.5;
            for (let y = 0; y < pattern.length; y++) {
                for (let x = 0; x < pattern[y].length; x++) {
                    if (pattern[y][x] === '#') {
                        fill(col);
                        noStroke();
                        rect(offsetX + x * largePixel, offsetY + y * largePixel, largePixel, largePixel);
                        
                        // Highlight
                        fill(255, 255, 255, 60);
                        rect(offsetX + x * largePixel, offsetY + y * largePixel, largePixel, 3);
                        rect(offsetX + x * largePixel, offsetY + y * largePixel, 3, largePixel);
                        
                        // Shadow
                        fill(0, 0, 0, 80);
                        rect(offsetX + x * largePixel + largePixel - 3, offsetY + y * largePixel, 3, largePixel);
                        rect(offsetX + x * largePixel, offsetY + y * largePixel + largePixel - 3, largePixel, 3);
                    }
                }
            }
        }
        
        function addDecorations(startX, startY) {
            // Add small decorative pixels (data dots)
            let dotColor = color(COLORS.secondary);
            dotColor.setAlpha(150);
            
            // Corner decorations
            fill(dotColor);
            noStroke();
            
            // Top row dots
            for (let i = 0; i < 5; i++) {
                rect(startX + i * PIXEL_SIZE * 3, startY - PIXEL_SIZE, 4, 4);
            }
            
            // Bottom row dots  
            for (let i = 0; i < 5; i++) {
                rect(startX + i * PIXEL_SIZE * 3 + PIXEL_SIZE * 2, startY + 13 * PIXEL_SIZE, 4, 4);
            }
            
            // Animated cursor blink effect
            let blinkX = startX + PIXEL_SIZE * 17;
            let blinkY = startY + PIXEL_SIZE * 7;
            
            // Draw underscore cursor
            fill(COLORS.primary);
            rect(blinkX, blinkY + PIXEL_SIZE * 2, PIXEL_SIZE * 2, 4);
        }
    </script>
</body>
</html>
